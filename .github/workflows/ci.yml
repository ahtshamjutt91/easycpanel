name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  shell-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bash syntax check
        run: |
          set -e
          for f in *.sh; do
            bash -n "$f"
            echo "OK: $f"
          done

      - name: ShellCheck
        run: shellcheck -x -S warning *.sh
